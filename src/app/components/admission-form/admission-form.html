

<div class="container mt-4 animate__animated animate__fadeIn">
  <h2 class="mb-4 text-center">Student Admission Form</h2>

  <form [formGroup]="studentForm" (ngSubmit)="submit()" class="shadow p-4 rounded bg-light">

    
    <div class="mb-3">
      <label>Name <span class="text-danger">*</span></label>
      
      <input #nameInput
       class="form-control"
       formControlName="name"
       [ngClass]="{'is-invalid': studentForm.get('name')?.touched && studentForm.get('name')?.invalid}">       
      
      <div *ngIf="studentForm.get('name')?.touched && studentForm.get('name')?.invalid"
           class="text-danger animate__animated animate__fadeIn">
        Name is required
      </div>
    </div>

    
    <div class="mb-3">
      <label>Mobile <span class="text-danger">*</span></label>
     
             <input class="form-control"
       formControlName="mobile"
       maxlength="10"
       inputmode="numeric"
       pattern="[0-9]*"
       (keypress)="allowOnlyNumbers($event)"
       [ngClass]="{'is-invalid': studentForm.get('mobile')?.touched && studentForm.get('mobile')?.invalid}">
      
      <div *ngIf="studentForm.get('mobile')?.touched && studentForm.get('mobile')?.invalid"
           class="text-danger animate__animated animate__fadeIn">
        Mobile must be 10 digits
      </div>
    </div>

    
    <div class="mb-3">
      
      <label>D.O.B <span class="text-danger">*</span></label>
      <input type="date"
             class="form-control"
             formControlName="dob"
             [ngClass]="{'is-invalid': studentForm.get('dob')?.touched && studentForm.get('dob')?.invalid}">

      <div *ngIf="studentForm.get('dob')?.touched && studentForm.get('dob')?.invalid"
           class="text-danger animate__animated animate__fadeIn">
        Date of Birth is required
      </div>

      <div *ngIf="studentForm.get('dob')?.value && getAge(studentForm.get('dob')?.value) < 5"
           class="text-danger animate__animated animate__shakeX">
        Age must be at least 5 years
      </div>
    </div>

    <div class="mb-3">
  <label>Country <span class="text-danger">*</span></label>

  <div class="input-group">
    <!-- Dropdown -->
    <select class="form-select"
            formControlName="country"
            [ngClass]="{'is-invalid': studentForm.get('country')?.touched && studentForm.get('country')?.invalid}">
      
      <option value="">--Select Country--</option>
      <option *ngFor="let c of countries" [value]="c.name">
        {{c.name}}
      </option>
    </select>

    <!-- ⚙️ Button -->
    <button style="color: black;" type="button"
            class="btn btn-outline-secondary"
            data-bs-toggle="modal"
            data-bs-target="#countryModal">
      ⚙️
    </button>
  </div>

  <!-- Validation -->
  <div *ngIf="studentForm.get('country')?.touched && studentForm.get('country')?.invalid"
       class="text-danger animate__animated animate__fadeIn">
    Country is required
  </div>
</div>

   
    <div class="mb-3">
  <label class="mb-2">Gender <span class="text-danger">*</span></label>

  <div class="d-flex gap-3">
    <div class="form-check">
      <input class="form-check-input" type="radio" value="Male" formControlName="gender">
      <label class="form-check-label">Male</label>
    </div>

    <div class="form-check">
      <input class="form-check-input" type="radio" value="Female" formControlName="gender">
      <label class="form-check-label">Female</label>
    </div>

    <div class="form-check">
      <input class="form-check-input" type="radio" value="Transgender" formControlName="gender">
      <label class="form-check-label">Transgender</label>
    </div>
  </div>

  <div *ngIf="studentForm.get('gender')?.touched && studentForm.get('gender')?.invalid"
       class="text-danger animate__animated animate__fadeIn mt-1">
    Gender is required
  </div>
</div>

  
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" formControlName="isIndian">
      <label class="form-check-label">Is Indian</label>
    </div>

    <button class="btn btn-primary me-2 px-4"
            type="submit">
      Save
    </button>

    <button class="btn btn-secondary px-4"
            type="button"
            (click)="reset()">
      Reset
    </button>

  </form>
</div>

















<!-- 🌍 COUNTRY MODAL -->
<div class="modal fade" id="countryModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Country Master</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <!-- Form -->
        <input class="form-control mb-2"
               placeholder="Country Name"
               [(ngModel)]="country.name"
               (blur)="country.name = country.name.trim()">

        <input type="number"
               class="form-control mb-2"
               placeholder="Sort Order"
               [(ngModel)]="country.sortOrder">

        <!-- Buttons -->
        <div class="mb-3 d-flex gap-2">
          <button class="btn btn-primary" (click)="saveCountry()">
            Save
          </button>

          <button class="btn btn-secondary" (click)="resetCountry()">
            Reset
          </button>
        </div>

        <!-- Table -->
        <table class="table table-bordered text-center">
          <tr>
            <th>Sl.No</th>
            <th>Name</th>
            <th>Order</th>
            <th>Actions</th>
          </tr>

          <tr *ngFor="let c of countries; let i = index">
            <td>{{i+1}}</td>
            <td>{{c.name}}</td>
            <td>{{c.sortOrder}}</td>
            <td>
              <!-- Edit Button -->
              <button class="btn btn-sm btn-outline-secondary me-2"
                      (click)="editCountry(c)">
                <i class="bi bi-pencil-square"></i>
              </button>

              <!-- Delete Button -->
              <button class="btn btn-sm btn-outline-secondary"
                      (click)="deleteCountry(c.id)">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
        </table>

      </div>

    </div>
  </div>
</div>
