<!-- Button (Trigger) -->
<button class="btn btn-outline-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#countryModal">
  🌍
</button>

<!-- Modal -->
<div class="modal fade" id="countryModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Country Master</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <!-- Form -->
        <input class="form-control mb-2" placeholder="Country Name"
               [(ngModel)]="country.name">

        <input type="number" class="form-control mb-2" placeholder="Sort Order"
               [(ngModel)]="country.sortOrder">

        <button class="btn btn-primary mb-3" (click)="save()">Save</button>

        <!-- Table -->
        <table class="table table-bordered">
          <tr *ngFor="let c of countries; let i = index">
            <td>{{i+1}}</td>
            <td>{{c.name}}</td>
            <td>{{c.sortOrder}}</td>
            <td>
              <button (click)="edit(c)">✏️</button>
              <button (click)="delete(c.id)">🗑️</button>
            </td>
          </tr>
        </table>

      </div>

    </div>
  </div>
</div>
